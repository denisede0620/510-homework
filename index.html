<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f7cac">
  <title>作業管理系統</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">CLASSROOM HOMEWORK</p>
      <h1>📚 作業管理系統</h1>
      <p id="classInfo">資料載入中……</p>
    </div>
    <button id="refreshBtn" class="icon-button" type="button" aria-label="重新整理">↻</button>
  </header>

  <main class="container">
    <section id="messageBox" class="message hidden" aria-live="polite"></section>

    <section id="homeView" class="view active">
      <div class="summary-grid">
        <article class="summary-card"><span>全班人數</span><strong id="studentCount">—</strong></article>
        <article class="summary-card"><span>今日作業</span><strong id="todayHomeworkCount">—</strong></article>
        <article class="summary-card"><span>目前日期</span><strong id="todayDate">—</strong></article>
      </div>

      <section class="panel">
        <div class="panel-title-row">
          <div><p class="eyebrow">TODAY</p><h2>📋 今日作業</h2></div>
          <button class="small-button" type="button" data-view="createView">＋新增</button>
        </div>
        <div id="todayHomeworkList" class="homework-list">
          <div class="empty-state">目前尚未建立今日作業。</div>
        </div>
      </section>

      <section class="menu-grid">
        <button class="menu-button" type="button" data-view="createView"><span class="menu-icon">➕</span><span>建立今日作業</span></button>
        <button class="menu-button" type="button" data-view="scanView"><span class="menu-icon">📷</span><span>開始掃描</span></button>
        <button class="menu-button" type="button" data-view="recordsView"><span class="menu-icon">📊</span><span>查看紀錄</span></button>
        <button class="menu-button" type="button" data-view="settingsView"><span class="menu-icon">⚙️</span><span>老師設定</span></button>
      </section>
    </section>

    <section id="createView" class="view">
      <div class="view-heading"><button class="back-button" type="button" data-view="homeView">← 返回</button><h2>建立今日作業</h2></div>
      <form id="homeworkForm" class="panel form-panel">
        <label>科目<select id="subjectSelect" required><option value="國語">國語</option><option value="數學">數學</option></select></label>
        <label>課次<select id="lessonSelect" required></select></label>
        <fieldset><legend>作業類型（可複選）</legend><div id="homeworkTypeOptions" class="check-grid"></div></fieldset>
        <div class="two-column">
          <label>截止日期<input id="dueDateInput" type="date" required></label>
          <label>截止時間<input id="dueTimeInput" type="time" required></label>
        </div>
        <button id="createHomeworkBtn" class="primary-button" type="submit">建立作業</button>
      </form>
    </section>

    <section id="scanView" class="view">
      <div class="view-heading"><button class="back-button" type="button" data-view="homeView">← 返回</button><h2>掃描繳交</h2></div>
      <section class="panel">
        <label>目前要收的作業<select id="scanHomeworkSelect"></select></label>
        <div id="selectedHomeworkCard" class="selected-homework-card">請先選擇一份作業。</div>
        <button id="startScanBtn" class="primary-button" type="button">開啟相機掃描</button>
        <button id="stopScanBtn" class="secondary-button hidden" type="button">停止掃描</button>
        <div id="qrReader" class="qr-reader hidden"></div>
        <div class="manual-entry">
          <p>相機無法使用時，也可以手動輸入 QR 編號：</p>
          <div class="inline-form">
            <input id="manualQrInput" type="text" inputmode="numeric" placeholder="例如 51001">
            <button id="manualSubmitBtn" class="small-button" type="button">登記</button>
          </div>
        </div>
        <div id="scanResult" class="scan-result hidden"></div>
      </section>
    </section>

    <section id="recordsView" class="view">
      <div class="view-heading"><button class="back-button" type="button" data-view="homeView">← 返回</button><h2>作業紀錄</h2></div>
      <section class="panel">
        <label>選擇作業<select id="recordHomeworkSelect"></select></label>
        <button id="loadRecordBtn" class="primary-button" type="button">查看紀錄</button>
      </section>
      <section id="recordSummary" class="summary-grid hidden"></section>
      <section id="studentRecordPanel" class="panel hidden">
        <div id="recordTitle" class="panel-title-row"></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>座號</th><th>姓名</th><th>繳交</th><th>訂正</th><th>操作</th></tr></thead>
            <tbody id="studentRecordBody"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="settingsView" class="view">
      <div class="view-heading"><button class="back-button" type="button" data-view="homeView">← 返回</button><h2>老師設定</h2></div>
      <form id="settingsForm" class="panel form-panel">
        <label>班級<input id="classNameInput" type="text" placeholder="例如：五年10班"></label>
        <label>老師姓名<input id="teacherNameInput" type="text" placeholder="例如：林茜儀"></label>
        <label>預設截止時間<input id="defaultDueTimeInput" type="time"></label>
        <button class="primary-button" type="submit">儲存設定</button>
      </form>
    </section>
  </main>

  <footer><p>510 作業管理系統 V2</p></footer>
</body>
</html>
