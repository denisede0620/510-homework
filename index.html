<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#315f85">
  <title>Robert 作業管理小幫手 v3.1</title>
  <link rel="stylesheet" href="./style.css?v=3.1.0">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="./script.js?v=3.1.0" defer></script>
</head>
<body>
<header class="topbar">
  <div>
    <div class="brand-row"><span class="robot">🤖</span><div><p class="kicker">ROBERT</p><h1>作業管理小幫手</h1></div></div>
    <p id="classInfo" class="subtext">資料載入中……</p>
  </div>
  <button id="refreshBtn" class="icon-btn" type="button" aria-label="重新整理">↻</button>
</header>

<main class="wrap">
  <div id="messageBox" class="message hidden" aria-live="polite"></div>

  <section id="homeView" class="view active">
    <div class="stats">
      <article><span>學生</span><strong id="studentCount">—</strong></article>
      <article><span>今日作業</span><strong id="todayHomeworkCount">—</strong></article>
      <article><span>日期</span><strong id="todayDate">—</strong></article>
    </div>

    <section class="card">
      <div class="section-head">
        <div><p class="kicker">TODAY</p><h2>今日作業</h2></div>
        <button class="small-btn" type="button" data-view="createView">＋ 新增</button>
      </div>
      <div id="todayHomeworkList" class="homework-list"><p class="empty">目前尚未建立今日作業。</p></div>
    </section>

    <div class="menu">
      <button type="button" data-view="createView"><span>📝</span>建立今日作業</button>
      <button type="button" data-view="scanView"><span>📷</span>掃描繳交</button>
      <button type="button" data-view="recordsView"><span>📋</span>繳交紀錄</button>
      <button type="button" data-view="settingsView"><span>⚙️</span>系統設定</button>
    </div>
  </section>

  <section id="createView" class="view">
    <div class="view-head"><button type="button" class="back-btn" data-view="homeView">← 返回</button><h2>建立今日作業</h2></div>
    <form id="homeworkForm" class="card form">
      <div>
        <label class="field-label">作業分類</label>
        <div class="tabs">
          <button type="button" class="tab active" data-subject="國語">國語</button>
          <button type="button" class="tab" data-subject="數學">數學</button>
          <button type="button" class="tab" data-subject="其他">其他</button>
          <button type="button" class="tab" data-subject="自行加入">自行加入</button>
        </div>
        <select id="subjectSelect" class="hidden" aria-hidden="true">
          <option>國語</option><option>數學</option><option>其他</option><option>自行加入</option>
        </select>
      </div>

      <label id="lessonField">課次<select id="lessonSelect"></select></label>

      <fieldset id="presetField">
        <legend>作業項目（可複選）</legend>
        <div id="homeworkTypeOptions" class="checks"></div>
      </fieldset>

      <section id="customField" class="custom-box hidden">
        <label>輸入作業名稱</label>
        <div class="inline">
          <input id="customHomeworkInput" type="text" placeholder="例如：帶水壺、自然報告">
          <button id="addCustomHomeworkBtn" class="small-btn" type="button">加入</button>
        </div>
        <p class="hint">可一次加入多個；按 × 可移除。</p>
        <div id="customHomeworkList" class="tags"></div>
      </section>

      <div class="two-col">
        <label>截止日期<input id="dueDateInput" type="date" required></label>
        <label>截止時間<input id="dueTimeInput" type="time" required></label>
      </div>

      <button id="createHomeworkBtn" class="primary" type="submit">建立今天作業</button>
    </form>
  </section>

  <section id="scanView" class="view">
    <div class="view-head"><button type="button" class="back-btn" data-view="homeView">← 返回</button><h2>掃描繳交</h2></div>
    <section class="card form">
      <label>選擇作業<select id="scanHomeworkSelect"></select></label>
      <div id="selectedHomeworkCard" class="selected">請先選擇作業。</div>
      <button id="startScanBtn" class="primary" type="button">開啟相機掃描</button>
      <button id="stopScanBtn" class="secondary hidden" type="button">停止掃描</button>
      <div id="qrReader" class="hidden"></div>
      <div class="custom-box">
        <label>手動輸入學生 QR 編號</label>
        <div class="inline"><input id="manualQrInput" type="text" inputmode="numeric"><button id="manualSubmitBtn" class="small-btn" type="button">登記</button></div>
      </div>
      <div id="scanResult" class="scan-result hidden"></div>
    </section>
  </section>

  <section id="recordsView" class="view">
    <div class="view-head"><button type="button" class="back-btn" data-view="homeView">← 返回</button><h2>繳交紀錄</h2></div>
    <section class="card form">
      <label>選擇作業<select id="recordHomeworkSelect"></select></label>
      <button id="loadRecordBtn" class="primary" type="button">查看紀錄</button>
    </section>
    <div id="recordSummary" class="stats hidden"></div>
    <section id="studentRecordPanel" class="card hidden">
      <div id="recordTitle" class="section-head"></div>
      <div class="table-wrap"><table><thead><tr><th>座號</th><th>姓名</th><th>繳交</th><th>訂正</th><th>操作</th></tr></thead><tbody id="studentRecordBody"></tbody></table></div>
    </section>
  </section>

  <section id="settingsView" class="view">
    <div class="view-head"><button type="button" class="back-btn" data-view="homeView">← 返回</button><h2>系統設定</h2></div>
    <form id="settingsForm" class="card form">
      <label>班級<input id="classNameInput" type="text"></label>
      <label>老師姓名<input id="teacherNameInput" type="text"></label>
      <label>預設截止時間<input id="defaultDueTimeInput" type="time"></label>
      <button class="primary" type="submit">儲存設定</button>
    </form>
  </section>
</main>

<footer>Robert 作業管理小幫手｜v3.1</footer>
</body>
</html>
