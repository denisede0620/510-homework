<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#526c5b">
  <title>510 作業小幫手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">CLASS QR</p>
      <h1>510 作業小幫手</h1>
      <p>選擇作業後，連續掃描學生 QR Code</p>
    </header>

    <section class="card">
      <label for="homework">今日作業</label>
      <select id="homework">
        <option value="">載入中……</option>
      </select>

      <div class="actions">
        <button id="startBtn" class="primary" disabled>📷 開始掃描</button>
        <button id="stopBtn" class="secondary" hidden>停止掃描</button>
      </div>

      <div id="reader" class="reader" hidden></div>
      <div id="message" class="message info">請先選擇作業。</div>
    </section>

    <section class="card stats">
      <div><strong id="total">0</strong><span>全班</span></div>
      <div><strong id="submitted">0</strong><span>已繳</span></div>
      <div><strong id="missing">0</strong><span>未繳</span></div>
      <div><strong id="rate">0%</strong><span>完成率</span></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>座號牆</h2>
        <button id="refreshBtn" class="text-btn">重新整理</button>
      </div>
      <div id="seatWall" class="seat-wall">
        <p class="empty">請先選擇作業</p>
      </div>
    </section>

    <section class="lists">
      <section class="card">
        <h2>已繳名單</h2>
        <div id="submittedList" class="student-list">
          <p class="empty">尚無資料</p>
        </div>
      </section>

      <section class="card">
        <h2>未繳名單</h2>
        <div id="missingList" class="student-list">
          <p class="empty">尚無資料</p>
        </div>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
